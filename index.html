<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>媽媽助手</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f4f7f9; margin: 0; padding: 15px; padding-bottom: 60px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: #333; margin: 10px 0; font-size: 22px; }
        .section-title { 
            grid-column: span 2; 
            font-size: 20px; 
            color: #444; 
            margin-top: 25px; 
            margin-bottom: 8px;
            padding-left: 12px;
            border-left: 6px solid #007AFF;
            text-align: left;
            width: 100%;
            font-weight: bold;
        }
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
            max-width: 600px;
        }
        .btn {
            aspect-ratio: 1.3 / 1;
            background-color: #007AFF;
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.12);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            text-align: center;
        }
        .btn-top-red { background-color: #FF3B30; grid-column: span 1; }
        .btn-top-green { background-color: #34C759; grid-column: span 1; }
        .btn-top-warn { background-color: #FF9500; grid-column: span 2; aspect-ratio: 4 / 1; }
        .btn-part { background-color: #8E8E93; }
        .btn:active { opacity: 0.6; transform: scale(0.96); }
    </style>
</head>
<body>

    <h1>媽媽助手</h1>

    <div class="grid-container">
        <button class="btn btn-top-red" onclick="speak('Tìm y tá giúp tôi', this.innerText)">找護理師</button>
        <button class="btn btn-top-green" onclick="speak('Cảm ơn bạn', this.innerText)">謝謝你</button>
        <button class="btn btn-top-warn" onclick="speak('Tôi thấy khó thở, cho tôi nghỉ một chút', this.innerText)">我很喘，讓我休息一下</button>

        <div class="section-title">身體需求</div>
        <button class="btn" onclick="speak('Nâng đầu giường lên', this.innerText)">調高床頭</button>
        <button class="btn" onclick="speak('Hạ đầu giường xuống', this.innerText)">調低床頭</button>
        <button class="btn" onclick="speak('Lật người giúp tôi', this.innerText)">幫我翻身</button>
        <button class="btn" onclick="speak('Tôi bị đau mông', this.innerText)">我屁股痛</button>
        <button class="btn" onclick="speak('Tôi muốn đi vệ sinh, kéo rèm giúp tôi', this.innerText)">上廁所/拉簾</button>
        <button class="btn" onclick="speak('Tôi khó tiểu, nhấn bụng giúp tôi', this.innerText)">尿不出/壓一下</button>
        <button class="btn" onclick="speak('Hút đờm giúp tôi', this.innerText)">幫我抽痰</button>
        <button class="btn" onclick="speak('Thay tã giúp tôi', this.innerText)">幫我換尿布</button>
        <button class="btn" onclick="speak('Tôi thấy nóng, lấy mền ra', this.innerText)">熱/拿開被子</button>
        <button class="btn" onclick="speak('Tôi thấy lạnh, đắp mền giúp tôi', this.innerText)">冷/蓋上被子</button>
        <button class="btn" onclick="speak('Nói lớn hơn một chút', this.innerText)">講話大聲點</button>
        <button class="btn" onclick="speak('Nói nhỏ lại một chút', this.innerText)">講話小聲點</button>

        <div class="section-title">需要物品</div>
        <button class="btn" onclick="speak('Lấy mắt kính giúp tôi', this.innerText)">我要眼鏡</button>
        <button class="btn" onclick="speak('Lấy cuốn sổ giúp tôi', this.innerText)">我要筆記本</button>
        <button class="btn" onclick="speak('Lấy cuốn sổ khác giúp tôi', this.innerText)">另一本筆記本</button>
        <button class="btn" onclick="speak('Lấy cây bút giúp tôi', this.innerText)">我要筆</button>
        <button class="btn" onclick="speak('Lấy cây bút khác giúp tôi', this.innerText)">另一隻筆</button>

        <div class="section-title">找人</div>
        <button class="btn" onclick="speak('Tìm dì giúp tôi', this.innerText)">幫我找阿姨</button>
        <button class="btn" onclick="speak('Tìm con gái tôi giúp tôi', this.innerText)">幫我找女兒</button>
        <button class="btn" onclick="speak('Tìm con trai tôi giúp tôi', this.innerText)">幫我找兒子</button>

        <div class="section-title">復健與護理</div>
        <button class="btn" onclick="speak('Thoa son dưỡng môi giúp tôi', this.innerText)">擦護唇膏</button>
        <button class="btn" onclick="speak('Tôi khát nước, muốn súc miệng', this.innerText)">口渴/要漱口</button>
        <button class="btn" onclick="speak('Tập tay giúp tôi', this.innerText)">帶著復健手</button>
        <button class="btn" onclick="speak('Tập chân giúp tôi', this.innerText)">帶著復健腳</button>

        <div class="section-title">身體部位</div>
        <button class="btn btn-part" onclick="speak('Đầu', this.innerText)">頭</button>
        <button class="btn btn-part" onclick="speak('Tay', this.innerText)">手</button>
        <button class="btn btn-part" onclick="speak('Bụng', this.innerText)">肚子</button>
        <button class="btn btn-part" onclick="speak('Bàng quang', this.innerText)">膀胱</button>
        <button class="btn btn-part" onclick="speak('Đùi', this.innerText)">腿</button>
        <button class="btn btn-part" onclick="speak('Bàn chân', this.innerText)">腳</button>
    </div>

    <script>
        function speak(vnText, zhText) {
            // 停止之前的語音，避免重疊
            window.speechSynthesis.cancel();

            // 1. 中文語音 (媽媽確認音)
            const zhUtterance = new SpeechSynthesisUtterance(zhText);
            zhUtterance.lang = 'zh-TW';
            zhUtterance.rate = 1.0;

            // 2. 越南語音 (護理人員溝通音)
            const vnUtterance = new SpeechSynthesisUtterance(vnText);
            vnUtterance.lang = 'vi-VN';
            vnUtterance.rate = 0.75; 

            // 將語音加入隊列
            window.speechSynthesis.speak(zhUtterance);
            window.speechSynthesis.speak(vnUtterance);
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(() => {});
            });
        }
    </script>
</body>
</html>
