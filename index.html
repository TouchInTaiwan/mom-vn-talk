<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>媽媽助手</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: #333; margin-bottom: 20px; }
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 100%;
            max-width: 600px;
        }
        .btn {
            aspect-ratio: 1 / 1;
            background-color: #007AFF;
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 28px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            text-align: center;
        }
        .btn:active { background-color: #0051a8; transform: scale(0.95); }
    </style>
</head>
<body>

    <h1>媽媽專用助手</h1>

    <div class="grid-container">
        <button class="btn" onclick="speak('Con đói bụng')">我肚子餓</button>
        <button class="btn" onclick="speak('Muốn uống nước')">想喝水</button>
        <button class="btn" onclick="speak('Cảm ơn')">謝謝</button>
        <button class="btn" onclick="speak('Con muốn nghỉ ngơi')">想休息</button>
        <button class="btn" onclick="speak('Đi vệ sinh')">去廁所</button>
        <button class="btn" onclick="speak('Con yêu mẹ')">我愛妳</button>
    </div>

    <script>
        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'vi-VN';
            utterance.rate = 0.8;
            window.speechSynthesis.speak(utterance);
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(() => {});
            });
        }
    </script>
</body>
</html>
